<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with Delta AI 🔺</title>
    <meta name="description" content="A practical guide for humans working with Tiểu Thịt Tươi (Delta AI)">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔺</text></svg>">
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #f85149;
            --blue: #58a6ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .landing {
            text-align: center;
            padding: 40px 24px;
        }
        .emoji { font-size: 80px; margin-bottom: 24px; }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--accent), #ff7b72);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 48px;
        }
        .cards {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 48px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.25s;
            width: 260px;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(248,81,73,0.15);
        }
        .card .flag { font-size: 48px; margin-bottom: 16px; }
        .card h2 { font-size: 1.3rem; margin-bottom: 8px; }
        .card p { color: var(--text-muted); font-size: 0.95rem; }
        footer {
            position: fixed;
            bottom: 24px;
            width: 100%;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <div class="landing">
        <div class="emoji">🔺</div>
        <h1>Working with Delta AI</h1>
        <p class="subtitle">A practical guide for humans · Hướng dẫn thực tế cho con người</p>
        <div class="cards">
            <a href="en.html" class="card">
                <div class="flag">🇬🇧</div>
                <h2>English</h2>
                <p>Read the guide in English</p>
            </a>
            <a href="vi.html" class="card">
                <div class="flag">🇻🇳</div>
                <h2>Tiếng Việt</h2>
                <p>Đọc hướng dẫn bằng tiếng Việt</p>
            </a>
        </div>
    </div>
    <footer>
        <a href="https://delta.com.vn">Delta Company</a> · Powered by <a href="https://openclaw.ai">OpenClaw</a>
    </footer>
</body>
</html>
